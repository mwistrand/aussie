# Prometheus configuration for Aussie Gateway
# Documentation: https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  scrape_interval: 15s
  evaluation_interval: 15s

  # Attach these labels to any time series or alerts
  external_labels:
    monitor: 'aussie-gateway'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert rules
rule_files:
  - /etc/prometheus/alerts/*.yaml

# Scrape configurations
scrape_configs:
  # Aussie Gateway metrics
  - job_name: 'aussie-gateway'
    metrics_path: '/q/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['api:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'aussie-gateway'
      - target_label: environment
        replacement: 'development'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Optional: Jaeger metrics (if exposed)
  # - job_name: 'jaeger'
  #   static_configs:
  #     - targets: ['jaeger:14269']
